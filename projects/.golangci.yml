version: "2"
run:
  concurrency: 4
  go: "1.25"
  tests: false
linters:
  default: none
  enable:
    - asasalint
    - bodyclose
    - contextcheck
    - dogsled
     - dupl
    - dupword
    - err113
    - errcheck
    - errorlint
    - exhaustive
    - forbidigo
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gomodguard
    - gosec
    - govet
    - ineffassign
    - misspell
    - mnd
    - nakedret
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    dogsled:
      max-blank-identifiers: 2
    dupl:
      threshold: 70
    errcheck:
      check-type-assertions: true
      check-blank: true
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 80
      statements: 80
      ignore-comments: true
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
    gocyclo:
      min-complexity: 20
    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
    govet:
      enable-all: true
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: true
    prealloc:
      for-loops: true
    staticcheck:
      checks:
        - all
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 1000
  max-same-issues: 1000
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/your/project)
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$